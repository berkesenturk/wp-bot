<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WhatsApp Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --green: #00e676;
    --green-dim: #00e67622;
    --red: #ff1744;
    --yellow: #ffd600;
    --text: #e8e8e8;
    --muted: #555;
    --in-bg: #1a2a1a;
    --out-bg: #1a1a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: var(--green);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  #status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  #status-badge .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  #status-badge.connected .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #status-badge.connected { border-color: var(--green); color: var(--green); }
  #status-badge.error .dot { background: var(--red); }
  #status-badge.error { border-color: var(--red); color: var(--red); }

  /* ── Main Layout ── */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 61px);
    overflow: hidden;
  }

  /* ── Left Panel ── */
  .left-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  /* QR Section */
  #qr-section {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #qr-section p {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  #qrcode {
    background: white;
    padding: 10px;
    border-radius: 8px;
    display: none;
  }

  #qrcode.visible { display: block; }

  .qr-placeholder {
    width: 150px; height: 150px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.65rem;
    text-align: center;
    line-height: 1.6;
  }

  /* Send Form */
  .send-form {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  label {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    display: block;
  }

  input, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 12px;
    border-radius: 6px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--green);
  }

  textarea { resize: none; min-height: 80px; }

  button#send-btn {
    background: var(--green);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.1s;
  }

  button#send-btn:hover { opacity: 0.85; }
  button#send-btn:active { transform: scale(0.98); }
  button#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Filter */
  .filter-bar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  #filter-input {
    font-size: 0.75rem;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    margin-top: auto;
    border-top: 1px solid var(--border);
  }

  .stat {
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--green);
  }

  .stat-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Right Panel ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #clear-btn:hover { border-color: var(--red); color: var(--red); }

  #message-list {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg-bubble {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 80%;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-bubble.incoming { align-self: flex-start; }
  .msg-bubble.outgoing { align-self: flex-end; }

  .msg-meta {
    font-size: 0.62rem;
    color: var(--muted);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .msg-bubble.outgoing .msg-meta { justify-content: flex-end; }

  .msg-direction {
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .incoming .msg-direction {
    background: var(--green-dim);
    color: var(--green);
  }

  .outgoing .msg-direction {
    background: #1a1a2a;
    color: #7c83ff;
  }

  .msg-body {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.82rem;
    line-height: 1.55;
    word-break: break-word;
  }

  .incoming .msg-body {
    background: var(--in-bg);
    border: 1px solid #1e3a1e;
    border-top-left-radius: 2px;
  }

  .outgoing .msg-body {
    background: var(--out-bg);
    border: 1px solid #1e1e3a;
    border-top-right-radius: 2px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 0.8rem;
  }

  .empty-icon {
    font-size: 2rem;
    opacity: 0.4;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.76rem;
    padding: 12px 20px;
    border-radius: 8px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📱</div>
    WhatsApp Console
  </div>
  <div id="status-badge">
    <div class="dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<main>
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="panel-title">Session</div>

    <div id="qr-section">
      <div id="qr-wrapper">
        <div class="qr-placeholder" id="qr-placeholder">
          Waiting for<br/>QR code...
        </div>
        <div id="qrcode"></div>
      </div>
      <p id="qr-hint">Start the server and scan<br/>the QR code in WhatsApp</p>
    </div>

    <div class="panel-title">Send Message</div>
    <div class="send-form">
      <div>
        <label>Phone Number</label>
        <input type="text" id="phone-input" placeholder="e.g. 32477123456" />
      </div>
      <div>
        <label>Message</label>
        <textarea id="message-input" placeholder="Type your message..."></textarea>
      </div>
      <button id="send-btn" disabled>Send Message</button>
    </div>

    <div class="filter-bar">
      <label>Filter by phone</label>
      <input type="text" id="filter-input" placeholder="Filter messages..." />
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="count-in">0</div>
        <div class="stat-label">Received</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="count-out">0</div>
        <div class="stat-label">Sent</div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="messages-header">
      <span>Message Log</span>
      <button id="clear-btn">Clear</button>
    </div>
    <div id="message-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <span>No messages yet</span>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const socket = io();
const messages = [];
let connected = false;
let qrRendered = false;

const statusBadge = document.getElementById('status-badge');
const statusText = document.getElementById('status-text');
const sendBtn = document.getElementById('send-btn');
const phoneInput = document.getElementById('phone-input');
const messageInput = document.getElementById('message-input');
const messageList = document.getElementById('message-list');
const emptyState = document.getElementById('empty-state');
const filterInput = document.getElementById('filter-input');
const countIn = document.getElementById('count-in');
const countOut = document.getElementById('count-out');

// ── Status updates ──
socket.on('status', ({ connected: c, message }) => {
  connected = c;
  statusText.textContent = message;
  statusBadge.className = c ? 'connected' : '';
  sendBtn.disabled = !c;
  if (c) {
    document.getElementById('qr-placeholder').style.display = 'none';
    document.getElementById('qrcode').style.display = 'none';
    document.getElementById('qr-hint').textContent = '✅ WhatsApp connected';
  }
});

// ── QR Code ──
socket.on('qr', (qrData) => {
  if (!qrRendered) {
    document.getElementById('qr-placeholder').style.display = 'none';
    const qrEl = document.getElementById('qrcode');
    qrEl.style.display = 'block';
    new QRCode(qrEl, {
      text: qrData,
      width: 160,
      height: 160,
      colorDark: '#000',
      colorLight: '#fff',
    });
    qrRendered = true;
  }
});

// ── Incoming messages from socket ──
socket.on('message', (msg) => {
  messages.push(msg);
  updateStats();
  renderMessages();
});

// ── Filter ──
filterInput.addEventListener('input', renderMessages);

function renderMessages() {
  const filter = filterInput.value.trim().toLowerCase();
  const filtered = filter
    ? messages.filter(m =>
        (m.from || m.to || '').toLowerCase().includes(filter) ||
        (m.content || '').toLowerCase().includes(filter)
      )
    : messages;

  emptyState.style.display = filtered.length ? 'none' : 'flex';

  // Remove all non-empty-state children
  Array.from(messageList.children).forEach(c => {
    if (c.id !== 'empty-state') c.remove();
  });

  filtered.forEach(msg => {
    const el = document.createElement('div');
    el.className = `msg-bubble ${msg.direction}`;

    const peer = msg.direction === 'incoming' ? msg.from : msg.to;
    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    el.innerHTML = `
      <div class="msg-meta">
        <span class="msg-direction">${msg.direction}</span>
        <span>${peer || ''}</span>
        <span>${time}</span>
      </div>
      <div class="msg-body">${escapeHtml(msg.content)}</div>
    `;
    messageList.appendChild(el);
  });

  messageList.scrollTop = messageList.scrollHeight;
}

function updateStats() {
  countIn.textContent = messages.filter(m => m.direction === 'incoming').length;
  countOut.textContent = messages.filter(m => m.direction === 'outgoing').length;
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Send button ──
sendBtn.addEventListener('click', async () => {
  const phone = phoneInput.value.trim();
  const message = messageInput.value.trim();
  if (!phone || !message) return showToast('Phone and message required', 'error');

  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending...';

  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, message }),
    });
    const data = await res.json();
    if (data.success) {
      messageInput.value = '';
      showToast('Message sent ✓', 'success');
    } else {
      showToast(data.error || 'Send failed', 'error');
    }
  } catch (e) {
    showToast('Network error', 'error');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send Message';
  }
});

// ── Enter key in message ──
messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) sendBtn.click();
});

// ── Clear ──
document.getElementById('clear-btn').addEventListener('click', () => {
  messages.length = 0;
  updateStats();
  renderMessages();
});

// ── Toast ──
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `show ${type}`;
  setTimeout(() => { toast.className = ''; }, 2800);
}

// ── Load existing messages on connect ──
fetch('/api/messages').then(r => r.json()).then(data => {
  data.forEach(m => messages.push(m));
  updateStats();
  renderMessages();
}).catch(() => {});

fetch('/api/status').then(r => r.json()).then(({ connected: c }) => {
  if (c) {
    connected = true;
    statusText.textContent = 'Connected';
    statusBadge.className = 'connected';
    sendBtn.disabled = false;
  }
}).catch(() => {});
</script>
</body>
</html>
