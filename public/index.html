<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WhatsApp Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #242424;
  --green: #00e676;
  --green-dim: rgba(0,230,118,0.1);
  --blue: #448aff;
  --blue-dim: rgba(68,138,255,0.1);
  --red: #ff1744;
  --text: #e2e2e2;
  --muted: #555;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  height: 100vh;
  display: grid;
  grid-template-rows: 52px 1fr;
  overflow: hidden;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  z-index: 10;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); }
#status-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.68rem;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 0.3s;
}
#status-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: 0.3s; }
#status-badge.connected { border-color: var(--green); color: var(--green); }
#status-badge.connected .dot { background: var(--green); box-shadow: 0 0 5px var(--green); }
main {
  display: grid;
  grid-template-columns: 280px 1fr;
  overflow: hidden;
}
.sidebar {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--surface);
  overflow: hidden;
}

/* QR section — hidden by default, shown only when needed */
#qr-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: none;          /* hidden until QR event or not connected */
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
#qr-section.visible { display: flex; }
#qr-hint { font-size: 0.65rem; color: var(--muted); text-align: center; line-height: 1.5; }
.qr-placeholder {
  width: 148px; height: 148px;
  border: 1px dashed var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 0.6rem;
  text-align: center;
  line-height: 1.6;
}
#qrcode {
  background: white;
  padding: 10px;
  border-radius: 8px;
  display: none;
  box-shadow: 0 0 0 3px #fff, 0 0 0 5px var(--green);
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 10px 4px;
  font-size: 0.65rem;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  user-select: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--green); border-bottom-color: var(--green); }
.tab .badge {
  display: inline-block;
  background: var(--green);
  color: #000;
  font-size: 0.55rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 10px;
  margin-left: 4px;
  vertical-align: middle;
}
#chat-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.chat-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.chat-item:hover { background: var(--surface2); }
.chat-item.active { background: var(--green-dim); border-left: 2px solid var(--green); }
.chat-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
}
.chat-avatar.personal { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }
.chat-avatar.group    { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.chat-info { flex: 1; min-width: 0; }
.chat-name {
  font-size: 0.78rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-preview {
  font-size: 0.65rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 3px;
}
.chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.chat-time { font-size: 0.58rem; color: var(--muted); }
.unread-badge {
  background: var(--green);
  color: #000;
  font-size: 0.58rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
}
.no-chats {
  padding: 30px 16px;
  text-align: center;
  font-size: 0.7rem;
  color: var(--muted);
  line-height: 1.8;
}
.chat-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.chat-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
}
.chat-header-info { display: flex; align-items: center; gap: 10px; }
.chat-header-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; }
.chat-header-jid { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }
.chat-type-pill {
  font-size: 0.6rem;
  padding: 3px 10px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.chat-type-pill.personal { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }
.chat-type-pill.group    { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
#message-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.empty-chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
  font-size: 0.75rem;
}
.empty-chat .icon { font-size: 2.5rem; opacity: 0.3; }
.msg-bubble {
  display: flex;
  flex-direction: column;
  max-width: 72%;
  animation: pop 0.2s ease;
}
@keyframes pop {
  from { opacity: 0; transform: translateY(6px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.msg-bubble.incoming { align-self: flex-start; }
.msg-bubble.outgoing { align-self: flex-end; }
.msg-sender {
  font-size: 0.6rem;
  color: var(--green);
  margin-bottom: 3px;
  padding-left: 2px;
}
.msg-bubble.outgoing .msg-sender { color: var(--blue); text-align: right; }
.msg-body {
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 0.8rem;
  line-height: 1.55;
  word-break: break-word;
}
.incoming .msg-body {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top-left-radius: 2px;
}
.outgoing .msg-body {
  background: var(--blue-dim);
  border: 1px solid var(--blue);
  border-top-right-radius: 2px;
}
.msg-time {
  font-size: 0.58rem;
  color: var(--muted);
  margin-top: 3px;
  padding: 0 2px;
}

.msg-bubble.outgoing .msg-time { text-align: right; }
.msg-img {
  max-width: 260px;
  max-height: 220px;
  width: 100%;
  border-radius: 8px;
  display: block;
  cursor: zoom-in;
  margin-bottom: 4px;
  object-fit: cover;
}
.msg-caption {
  font-size: 0.78rem;
  line-height: 1.5;
  padding: 4px 2px 0;
  color: var(--text);
}
.compose {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
#compose-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  padding: 10px 14px;
  border-radius: 8px;
  outline: none;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  transition: border-color 0.2s;
  line-height: 1.5;
}
#compose-input:focus { border-color: var(--green); }
#compose-input:disabled { opacity: 0.4; }
#send-btn {
  background: var(--green);
  color: #000;
  border: none;
  width: 42px; height: 42px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
#send-btn:hover { opacity: 0.8; }
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.no-selection {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
  font-size: 0.78rem;
  text-align: center;
  line-height: 1.8;
}
.no-selection .icon { font-size: 3rem; opacity: 0.2; }
#toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.72rem;
  padding: 10px 18px;
  border-radius: 8px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.25s;
  pointer-events: none;
  z-index: 999;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.success { border-color: var(--green); color: var(--green); }
#toast.error { border-color: var(--red); color: var(--red); }

#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  object-fit: contain;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    WhatsApp Console
  </div>
  <div id="status-badge">
    <div class="dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<main>
  <div class="sidebar">

    <!-- QR section: hidden by default, shown only when session needs login -->
    <div id="qr-section">
      <div class="qr-placeholder" id="qr-placeholder">Waiting for<br/>QR code...</div>
      <div id="qrcode"></div>
      <p id="qr-hint">Scan QR in WhatsApp<br/>Linked Devices</p>
    </div>

    <div class="tabs">
      <div class="tab active" data-filter="all">All <span class="badge" id="badge-all">0</span></div>
      <div class="tab" data-filter="personal">DMs <span class="badge" id="badge-personal" style="display:none"></span></div>
      <div class="tab" data-filter="group">Groups <span class="badge" id="badge-group" style="display:none"></span></div>
    </div>

    <div id="chat-list">
      <div class="no-chats">No chats yet.<br/>Messages will appear here.</div>
    </div>
  </div>

  <div class="chat-panel" id="chat-panel">
    <div class="no-selection">
      <div class="icon">💬</div>
      Select a chat to view messages
    </div>
  </div>
</main>

<div id="toast"></div>
<div id="lightbox"><img id="lightbox-img" src="" alt="" /></div>

<script>
const socket = io();

const chats = {};
let activeJid = null;
let currentFilter = "all";
let qrRendered = false;

const statusBadge = document.getElementById("status-badge");
const statusText  = document.getElementById("status-text");
const chatList    = document.getElementById("chat-list");
const chatPanel   = document.getElementById("chat-panel");
const qrSection   = document.getElementById("qr-section");

// ── Socket: connection status ──────────────────────────────────────────────────
socket.on("status", ({ connected, message }) => {
  statusText.textContent = message;
  statusBadge.className  = connected ? "connected" : "";

  if (connected) {
    // Session restored or just connected — hide QR entirely
    qrSection.classList.remove("visible");
  }
});

// ── Socket: QR code needed (new login required) ────────────────────────────────
socket.on("qr", (qrData) => {
  // Show the QR section
  qrSection.classList.add("visible");

  if (qrRendered) return; // don't render a second canvas on top
  document.getElementById("qr-placeholder").style.display = "none";
  const el = document.getElementById("qrcode");
  el.style.display = "block";
  new QRCode(el, { text: qrData, width: 200, height: 200, colorDark: "#000", colorLight: "#fff" });
  qrRendered = true;
});

// ── Socket: chat updated ───────────────────────────────────────────────────────
socket.on("chat_updated", (summary) => {
  updateChatInList(summary);
  renderChatList();
  updateBadges();
});

// ── Socket: new message ────────────────────────────────────────────────────────
socket.on("message", (msg) => {
  // Ensure chat exists in local state
  if (!chats[msg.jid]) {
    chats[msg.jid] = {
      jid:      msg.jid,
      name:     msg.jid,
      chatType: msg.jid.endsWith("@g.us") ? "group" : "personal",
      unread:   0,
      messages: [],
    };
  }

  const chat = chats[msg.jid];
  chat.messages.push(msg);
  chat.lastMessage = msg;

  // Only increment unread for incoming messages when chat is not active
  if (msg.direction === "incoming" && msg.jid !== activeJid) {
    chat.unread++;
  }

  // Append to open chat panel immediately (both incoming AND outgoing)
  if (msg.jid === activeJid) {
    appendMessage(msg);
    chat.unread = 0;
  }

  renderChatList();
  updateBadges();
});

// ── Chat list rendering ────────────────────────────────────────────────────────
function updateChatInList(summary) {
  if (!chats[summary.jid]) {
    chats[summary.jid] = { messages: [], ...summary };
  } else {
    Object.assign(chats[summary.jid], summary);
  }
}

function renderChatList() {
  const items = Object.values(chats)
    .filter(c => currentFilter === "all" || c.chatType === currentFilter)
    .sort((a, b) => {
      const ta = a.lastMessage?.timestamp || "";
      const tb = b.lastMessage?.timestamp || "";
      return tb.localeCompare(ta);
    });

  if (items.length === 0) {
    chatList.innerHTML = '<div class="no-chats">No chats yet.<br/>Messages will appear here.</div>';
    return;
  }

  chatList.innerHTML = items.map(chat => {
    const initials = (chat.name || "?").substring(0, 2).toUpperCase();
    const preview  = chat.lastMessage ? escapeHtml(chat.lastMessage.content.substring(0, 40)) : "No messages";
    const time     = chat.lastMessage ? formatTime(chat.lastMessage.timestamp) : "";
    const unread   = chat.unread > 0 ? '<div class="unread-badge">' + chat.unread + '</div>' : "";
    const active   = chat.jid === activeJid ? " active" : "";
    return (
      '<div class="chat-item' + active + '" data-jid="' + escapeAttr(chat.jid) + '">'
      + '<div class="chat-avatar ' + (chat.chatType || "personal") + '">' + initials + '</div>'
      + '<div class="chat-info">'
      + '<div class="chat-name">' + escapeHtml(chat.name) + '</div>'
      + '<div class="chat-preview">' + preview + '</div>'
      + '</div>'
      + '<div class="chat-meta"><div class="chat-time">' + time + '</div>' + unread + '</div>'
      + '</div>'
    );
  }).join("");

  chatList.querySelectorAll(".chat-item").forEach(el => {
    el.addEventListener("click", () => openChat(el.dataset.jid));
  });
}

function updateBadges() {
  const all      = Object.values(chats);
  const personal = all.filter(c => c.chatType === "personal");
  const groups   = all.filter(c => c.chatType === "group");

  document.getElementById("badge-all").textContent = all.length;

  const pb = document.getElementById("badge-personal");
  pb.textContent   = personal.length;
  pb.style.display = personal.length ? "" : "none";

  const gb = document.getElementById("badge-group");
  gb.textContent   = groups.length;
  gb.style.display = groups.length ? "" : "none";
}

// ── Open a chat ────────────────────────────────────────────────────────────────
async function openChat(jid) {
  activeJid = jid;
  const chat = chats[jid];
  if (!chat) return;
  chat.unread = 0;

  // Fetch messages from server if not yet loaded
  if (!chat.messages || chat.messages.length === 0) {
    try {
      const res = await fetch("/api/chats/" + encodeURIComponent(jid) + "/messages");
      if (res.ok) chat.messages = await res.json();
    } catch (e) {}
  }

  renderChatPanel(chat);
  renderChatList();
  updateBadges();
}

// ── Render the active chat panel ───────────────────────────────────────────────
function renderChatPanel(chat) {
  const typeLabel = chat.chatType === "group" ? "Group" : "Personal";
  const initials  = (chat.name || "?").substring(0, 2).toUpperCase();

  chatPanel.innerHTML =
    '<div class="chat-header">'
    + '<div class="chat-header-info">'
    + '<div class="chat-avatar ' + (chat.chatType || "personal") + '" style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;">' + initials + '</div>'
    + '<div>'
    + '<div class="chat-header-name">' + escapeHtml(chat.name) + '</div>'
    + '<div class="chat-header-jid">' + escapeHtml(chat.jid) + '</div>'
    + '</div>'
    + '</div>'
    + '<span class="chat-type-pill ' + (chat.chatType || "personal") + '">' + typeLabel + '</span>'
    + '</div>'
    + '<div id="message-area">'
    + (chat.messages.length === 0 ? '<div class="empty-chat"><div class="icon">💬</div><span>No messages</span></div>' : '')
    + '</div>'
    + '<div class="compose">'
    + '<textarea id="compose-input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>'
    + '<button id="send-btn">&#10148;</button>'
    + '</div>';

  const area    = chatPanel.querySelector("#message-area");
  const sendBtn = chatPanel.querySelector("#send-btn");
  const input   = chatPanel.querySelector("#compose-input");
  const isGroup = chat.chatType === "group";

  chat.messages.forEach(msg => appendMessageTo(area, msg, isGroup));
  area.scrollTop = area.scrollHeight;

  async function doSend() {
    const text = input.value.trim();
    if (!text) return;

    // Clear input immediately so it feels responsive
    input.value = "";
    input.style.height = "42px";
    sendBtn.disabled = true;

    try {
      const res  = await fetch("/api/send", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ jid: activeJid, message: text }),
      });
      const data = await res.json();
      if (!data.success) {
        showToast(data.error || "Send failed", "error");
      }
      // Note: the sent message appears via socket.on("message") from the server
      // so we don't manually append it here to avoid duplicates
    } catch (e) {
      showToast("Network error", "error");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", doSend);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "42px";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  input.focus();
}

// ── Append a single message to the visible panel ───────────────────────────────
function appendMessage(msg) {
  if (msg.jid !== activeJid) return;
  const area = document.getElementById("message-area");
  if (!area) return;
  const emptyState = area.querySelector(".empty-chat");
  if (emptyState) emptyState.remove();
  const chat    = chats[msg.jid];
  const isGroup = chat && chat.chatType === "group";
  appendMessageTo(area, msg, isGroup);
  area.scrollTop = area.scrollHeight;
}

function appendMessageTo(area, msg, isGroup) {
  const el       = document.createElement("div");
  el.className   = "msg-bubble " + (msg.direction || "incoming");
  const time     = formatTime(msg.timestamp);
  const showSender = isGroup && msg.direction === "incoming";
  const senderLine = showSender
    ? '<div class="msg-sender">' + escapeHtml(msg.sender) + '</div>'
    : msg.direction === "outgoing"
      ? '<div class="msg-sender">You</div>'
      : "";

  let bodyHtml = "";
  if (msg.type === "image" && msg.mediaPath) {
    // mediaPath is an absolute local path — convert to /media/<filename>
    const filename = msg.mediaPath.split("/").pop();
    const caption  = msg.content && msg.content !== "[image]" ? msg.content : "";
    bodyHtml =
      '<div class="msg-body" style="padding:6px;">'
      + '<img class="msg-img" src="/media/' + escapeAttr(filename) + '" alt="image" />'
      + (caption ? '<div class="msg-caption">' + escapeHtml(caption) + '</div>' : '')
      + '</div>';
  } else {
    bodyHtml = '<div class="msg-body">' + escapeHtml(msg.content) + '</div>';
  }

  el.innerHTML = senderLine + bodyHtml + '<div class="msg-time">' + time + '</div>';

  // Lightbox on image click
  const img = el.querySelector(".msg-img");
  if (img) {
    img.addEventListener("click", () => {
      document.getElementById("lightbox-img").src = img.src;
      document.getElementById("lightbox").classList.add("open");
    });
  }

  area.appendChild(el);
}

// ── Tabs ───────────────────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentFilter = tab.dataset.filter;
    renderChatList();
  });
});

// ── Utilities ─────────────────────────────────────────────────────────────────
function formatTime(iso) {
  if (!iso) return "";
  const d   = new Date(iso);
  const now = new Date();
  return d.toDateString() === now.toDateString()
    ? d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    : d.toLocaleDateString([], { month: "short", day: "numeric" });
}
function escapeHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escapeAttr(s) {
  return String(s || "").replace(/"/g, "&quot;");
}
function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "show " + (type || "");
  setTimeout(() => { t.className = ""; }, 2800);
}

// ── On page load: check session and load existing chats ────────────────────────
fetch("/api/status").then(r => r.json()).then(({ connected }) => {
  if (connected) {
    statusText.textContent = "Connected";
    statusBadge.className  = "connected";
    // Session alive — QR section stays hidden
  } else {
    // Not connected yet — show QR section to prompt login
    qrSection.classList.add("visible");
  }
}).catch(() => {
  qrSection.classList.add("visible"); // show QR on error too
});

fetch("/api/chats").then(r => r.json()).then(list => {
  list.forEach(c => { chats[c.jid] = { messages: [], ...c }; });
  renderChatList();
  updateBadges();
}).catch(() => {});

// Lightbox close
document.getElementById("lightbox").addEventListener("click", () => {
  document.getElementById("lightbox").classList.remove("open");
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") document.getElementById("lightbox").classList.remove("open");
});
</script>
</body>
</html>
